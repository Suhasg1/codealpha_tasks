<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Nature Group</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .benefits { background: var(--cream); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
    .benefit  { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--forest); margin-bottom: .35rem; }
    .benefit:last-child { margin-bottom: 0; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <div class="navbar-logo-icon">🌿</div>
      <div><div class="navbar-logo-name">Nature Group</div><div class="navbar-logo-tagline">Pure from Nature</div></div>
    </a>
    <div class="navbar-links">
      <a href="/">Home</a><a href="/products">Shop</a>
    </div>
    <div class="navbar-right">
      <a href="/cart" class="cart-btn">🛒 Cart <span class="cart-badge" id="cart-count">0</span></a>
    </div>
  </div>
</nav>

<main>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌿</div>
        <h2>Join Nature Group</h2>
        <p>Create your free account today</p>
      </div>

      <div class="benefits">
        <div class="benefit">✅ Track your orders in real-time</div>
        <div class="benefit">🚚 Free shipping on orders above ₹500</div>
        <div class="benefit">🎁 Exclusive member offers &amp; discounts</div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input class="form-control" type="text" id="name" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>

      <button class="btn btn-primary btn-lg btn-full" id="auth-submit" data-fn="register" onclick="doRegister()">
        Create Account →
      </button>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Already have an account? <a href="/login">Sign in →</a>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>
<script src="/static/js/main.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
