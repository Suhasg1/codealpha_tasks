<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Nature Group</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <div class="navbar-logo-icon">🌿</div>
      <div><div class="navbar-logo-name">Nature Group</div><div class="navbar-logo-tagline">Pure from Nature</div></div>
    </a>
    <div class="navbar-links">
      <a href="/">Home</a><a href="/products">Shop</a>
    </div>
    <div class="navbar-right">
      <a href="/cart" class="cart-btn">🛒 Cart <span class="cart-badge" id="cart-count">0</span></a>
    </div>
  </div>
</nav>

<main>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌿</div>
        <h2>Welcome Back</h2>
        <p>Sign in to your Nature Group account</p>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Your password" autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-lg btn-full" id="auth-submit" data-fn="login" onclick="doLogin()">
        Sign In →
      </button>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Don't have an account? <a href="/register">Create one free →</a>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>
<script src="/static/js/main.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
