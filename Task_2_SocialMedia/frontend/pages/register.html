<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ConnectSphere</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/theme.js"></script>
</head>
<body>
<main>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌐</div>
        <h1>Join ConnectSphere</h1>
        <p>Create your free account</p>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" type="text" id="name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input class="form-control" type="text" id="username" placeholder="@yourusername" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" id="password" placeholder="Min. 6 characters"
               onkeydown="if(event.key==='Enter') doRegister()">
      </div>

      <button class="btn btn-primary btn-lg btn-full" id="reg-btn" onclick="doRegister()">
        Create Account →
      </button>

      <div class="auth-divider">or</div>
      <div class="auth-switch">
        Already have an account? <a href="/login">Sign in →</a>
      </div>
    </div>
  </div>
</main>
<div id="toast"></div>
<script src="/static/js/main.js"></script>
<script>
  async function doRegister() {
    const name     = document.getElementById('name').value.trim();
    const username = document.getElementById('username').value.trim().replace('@','');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('reg-btn');
    errEl.style.display = 'none';
    if (!name || !username || !email || !password) { errEl.textContent = 'All fields are required.'; errEl.style.display = 'block'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
    btn.textContent = 'Creating account…'; btn.disabled = true;
    const data = await apiFetch('/api/register', { method: 'POST', body: { name, username, email, password } });
    if (data.success) {
      showToast(`Welcome to ConnectSphere, ${data.name}! 🌐`);
      setTimeout(() => location.href = '/', 1000);
    } else {
      errEl.textContent = data.error || 'Registration failed.';
      errEl.style.display = 'block';
      btn.textContent = 'Create Account →'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
